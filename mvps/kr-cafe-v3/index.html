<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KR 카페 MVP v3</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background:#f8fafc; color:#0f172a; }
      .wrap { max-width: 760px; margin: 40px auto; padding: 20px; background:#fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.06); }
      .row { display:flex; flex-direction:column; margin-bottom:12px; }
      input, select, textarea, button { padding:10px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; }
      button { cursor:pointer; background:#2563eb; color:#fff; border:none; }
      .muted { color:#475569; font-size:13px; }
      .ok { color:#166534; }
      .err { color:#b91c1c; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>KR 카페 MVP v3</h1>
      <p class="muted">Supabase + Vercel + GitHub Website 연결용 최소 폼</p>

      <form id="lead-form">
        <div class="row">
          <label for="industry">업종</label>
          <select id="industry" required>
            <option value="cafe">카페</option>
            <option value="restaurant">요식업</option>
            <option value="other">기타</option>
          </select>
        </div>
        <div class="row">
          <label for="budget_range">예산</label>
          <select id="budget_range" required>
            <option value="below_100">100만원 미만</option>
            <option value="100-200">100~200만원</option>
            <option value="200+">200만원 이상</option>
          </select>
        </div>
        <div class="row">
          <label for="timeline">일정</label>
          <select id="timeline" required>
            <option value="within_2_weeks">2주 내</option>
            <option value="within_1_month">1개월 내</option>
            <option value="flexible">협의 가능</option>
          </select>
        </div>
        <div class="row">
          <label for="contact">연락처</label>
          <input id="contact" required placeholder="010-1234-5678" />
        </div>
        <div class="row">
          <label for="note">메모 (선택)</label>
          <textarea id="note" rows="4" maxlength="200"></textarea>
        </div>
        <button type="submit">문의 보내기</button>
      </form>

      <p id="result" class="muted"></p>
      <p class="muted"><a href="../privacy.html">개인정보 처리방침</a></p>
    </main>

    <script>
      const apiBase = "https://example.vercel.app";
      const params = new URLSearchParams(location.search);

      function getUtm(key) {
        return params.get(key) || "unknown_source";
      }

      document.getElementById("lead-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const result = document.getElementById("result");
        result.textContent = "전송 중...";

        const payload = {
          industry: document.getElementById("industry").value,
          budget_range: document.getElementById("budget_range").value,
          timeline: document.getElementById("timeline").value,
          contact: document.getElementById("contact").value,
          note: document.getElementById("note").value,
          utm_source: getUtm("utm_source"),
          utm_medium: getUtm("utm_medium"),
          utm_campaign: getUtm("utm_campaign")
        };

        try {
          const res = await fetch(`${apiBase}/api/leads`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const json = await res.json();
          if (json.ok) {
            result.className = "ok";
            result.textContent = `저장 완료: ${json.lead_id}`;
          } else {
            result.className = "err";
            result.textContent = `실패: ${json.error || "unknown_error"}`;
          }
        } catch {
          result.className = "err";
          result.textContent = "네트워크 오류로 전송 실패";
        }
      });
    </script>
  </body>
</html>
